<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Azad Prime Medico | Dr Anand Sathi</title>

<link rel="icon" href="logo.png">

<style>

/* BODY */
body {
    margin:0;
    font-family:Segoe UI;
    background: linear-gradient(135deg,#eef6ff,#d9ecff);
}

/* HERO */
.hero {
    height:100vh;
    background:url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=1600') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.hero-content {
    position:relative;
    z-index:2;
    color:white;
}

.logo { width:100px; }

h1 { color:#00c6ff; }

/* BUTTON */
.btn {
    padding:12px 20px;
    border-radius:30px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    text-decoration:none;
    display:inline-block;
    margin:8px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* SECTION */
.section {
    max-width:500px;
    margin:auto;
    padding:30px 15px;
}

/* GLASS CARD */
.card {
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:15px;
    margin-top:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* SERVICES */
.services {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}
.service {
    background:#fff;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

/* COUNTER */
.stats {
    display:flex;
    justify-content:space-around;
    text-align:center;
}

/* SLIDER */
.slider {
    height:200px;
    position:relative;
}
.slide {
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    animation:slide 12s infinite;
}
.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:4s;}
.slide:nth-child(3){animation-delay:8s;}

@keyframes slide {
    0%{opacity:0;}
    10%{opacity:1;}
    30%{opacity:1;}
    40%{opacity:0;}
}

/* FLOAT BUTTON */
.float {
    position:fixed;
    right:15px;
    bottom:80px;
}
.float a {
    display:block;
    margin-top:10px;
    padding:12px;
    border-radius:50%;
    background:#25d366;
    color:white;
    text-decoration:none;
}

/* STICKY BAR */
.sticky {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
}
.sticky a {
    flex:1;
    padding:15px;
    text-align:center;
    color:white;
    text-decoration:none;
}
.call { background:#0072ff; }
.whatsapp { background:#25d366; }

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<img src="logo.png" class="logo">
<h1>Azad Prime Medico</h1>
<p>Dr Anand Sathi</p>

<a class="btn" href="tel:+917633801161">Call</a>
<a class="btn" href="https://wa.me/917633801161">WhatsApp</a>
</div>
</div>

<div class="section">

<div class="card">
<h2>About</h2>
<p>Modern clinic with OPD, Pharmacy & Diagnostics.</p>
</div>

<div class="card">
<h2>Services</h2>
<div class="services">
<div class="service">OPD</div>
<div class="service">Pharmacy</div>
<div class="service">CT Scan</div>
<div class="service">MRI</div>
<div class="service">Ultrasound</div>
<div class="service">Diagnostics</div>
</div>
</div>

<div class="card">
<h2>Stats</h2>
<div class="stats">
<div><h3 id="c1">0</h3><p>Patients</p></div>
<div><h3 id="c2">0</h3><p>Years</p></div>
<div><h3 id="c3">0</h3><p>Trust</p></div>
</div>
</div>

<div class="card">
<h2>Gallery</h2>
<div class="slider">
<img class="slide" src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=800">
<img class="slide" src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=800">
<img class="slide" src="https://images.unsplash.com/photo-1581595219315-a187dd40c322?w=800">
</div>
</div>

</div>

<!-- FLOAT -->
<div class="float">
<a href="https://wa.me/917633801161">💬</a>
<a href="tel:+917633801161" style="background:#0072ff;">📞</a>
</div>

<!-- STICKY -->
<div class="sticky">
<a class="call" href="tel:+917633801161">Call</a>
<a class="whatsapp" href="https://wa.me/917633801161">WhatsApp</a>
</div>

<script>
function count(id, max){
let i=0;
let el=document.getElementById(id);
let int=setInterval(()=>{
i+=Math.ceil(max/50);
if(i>=max){i=max; clearInterval(int);}
el.innerText=i+"+";
},30);
}
count("c1",5000);
count("c2",10);
count("c3",100);
</script>

</body>
</html>
